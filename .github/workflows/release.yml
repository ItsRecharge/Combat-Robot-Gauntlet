name: Release

# Builds single-file/one-icon downloads for all three OSes plus a source zip,
# and publishes them as one GitHub Release. Push a v* tag to cut a release, or
# run manually (workflow_dispatch) with a tag.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.1)"
        required: true
        default: "v0.1.1"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            kind: windows
            asset: Combat-Robot-Gauntlet-windows-x64
          - os: macos-14            # Apple Silicon (arm64)
            kind: macos
            asset: Combat-Robot-Gauntlet-macos-arm64
          - os: macos-13            # Intel (x86_64)
            kind: macos
            asset: Combat-Robot-Gauntlet-macos-x86_64
          - os: ubuntu-latest
            kind: linux
            asset: Combat-Robot-Gauntlet-linux-x86_64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: System libs (Linux — Qt/VTK/GL need these to import while freezing)
        if: matrix.kind == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1 libegl1 libxcb-cursor0 libxkbcommon0 libdbus-1-3 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install app + PyInstaller
        run: python -m pip install -e . pyinstaller

      - name: Build (build/gauntlet.spec — one-file on Windows, one-folder else)
        run: pyinstaller build/gauntlet.spec --noconfirm

      # ---- smoke-test the frozen binary (headless: skip only the VTK render) ----
      - name: Smoke-test (Windows)
        if: matrix.kind == 'windows'
        shell: pwsh
        env:
          GAUNTLET_SELFTEST_SKIP_RENDER: "1"
        run: |
          $exe = "dist/Combat-Robot-Gauntlet.exe"
          $p = Start-Process -FilePath $exe -ArgumentList "--selftest" -Wait -PassThru
          $log = Join-Path $env:TEMP "gauntlet_selftest.log"
          if (Test-Path $log) { Get-Content $log }
          if ($p.ExitCode -ne 0) { throw "selftest failed: exit $($p.ExitCode)" }

      - name: Smoke-test (macOS)
        if: matrix.kind == 'macos'
        env:
          GAUNTLET_SELFTEST_SKIP_RENDER: "1"
        run: |
          ./dist/Combat-Robot-Gauntlet.app/Contents/MacOS/Combat-Robot-Gauntlet --selftest
          cat "${TMPDIR}gauntlet_selftest.log" 2>/dev/null || true

      - name: Smoke-test (Linux)
        if: matrix.kind == 'linux'
        env:
          GAUNTLET_SELFTEST_SKIP_RENDER: "1"
          QT_QPA_PLATFORM: offscreen
        run: |
          xvfb-run -a ./dist/Combat-Robot-Gauntlet/Combat-Robot-Gauntlet --selftest
          cat "${TMPDIR:-/tmp/}gauntlet_selftest.log" 2>/dev/null || true

      # ---- package (always, so an asset still ships if the smoke-test trips) ----
      - name: Package (Windows — single exe, no repack)
        if: always() && matrix.kind == 'windows'
        shell: pwsh
        run: Copy-Item dist/Combat-Robot-Gauntlet.exe "${{ matrix.asset }}.exe"

      - name: Package (macOS — zip the .app, ditto preserves the bundle)
        if: always() && matrix.kind == 'macos'
        run: ditto -c -k --keepParent dist/Combat-Robot-Gauntlet.app "${{ matrix.asset }}.zip"

      - name: Package (Linux — AppImage)
        if: always() && matrix.kind == 'linux'
        run: |
          chmod +x scripts/build_appimage.sh
          ./scripts/build_appimage.sh "${{ matrix.asset }}.AppImage"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          if-no-files-found: ignore
          path: |
            ${{ matrix.asset }}.exe
            ${{ matrix.asset }}.zip
            ${{ matrix.asset }}.AppImage

  source:
    name: Source zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: git archive (tracked files only — no venv/dist/build junk)
        run: git archive --format=zip -o Combat-Robot-Gauntlet-source.zip HEAD
      - uses: actions/upload-artifact@v4
        with:
          name: Combat-Robot-Gauntlet-source
          path: Combat-Robot-Gauntlet-source.zip

  release:
    name: Publish release
    needs: [build, source]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: List collected assets
        run: ls -lR assets

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Combat-Robot-Gauntlet ${{ steps.tag.outputs.tag }}
          files: assets/**/*
          body: |
            **Combat-Robot-Gauntlet** — impact-damage simulator for combat robots. Made by Neel Bansal.

            ### Downloads
            | OS | File | Notes |
            |----|------|-------|
            | Windows 10/11 (x64) | `Combat-Robot-Gauntlet-windows-x64.exe` | Single file. First launch unpacks (loading screen shown). |
            | macOS (Apple Silicon) | `Combat-Robot-Gauntlet-macos-arm64.zip` | Unzip → open the `.app`. |
            | macOS (Intel) | `Combat-Robot-Gauntlet-macos-x86_64.zip` | Unzip → open the `.app`. |
            | Linux (x86_64) | `Combat-Robot-Gauntlet-linux-x86_64.AppImage` | `chmod +x` then run. |
            | Source | `Combat-Robot-Gauntlet-source.zip` | Uncompiled source. |

            ### Running
            - **Windows:** SmartScreen may warn (unsigned) → *More info → Run anyway*.
            - **macOS:** unsigned → right-click → *Open*, or `xattr -dr com.apple.quarantine Combat-Robot-Gauntlet.app`.
            - **Linux:** `chmod +x Combat-Robot-Gauntlet-linux-x86_64.AppImage && ./Combat-Robot-Gauntlet-linux-x86_64.AppImage`.

            Each app shows a loading bar on startup and bundles its sample bot + materials.
